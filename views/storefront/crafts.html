<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storefront — WASTE2WORTH</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .hero-section {
      background: linear-gradient(135deg, var(--color-primary-dark) 0%, var(--color-primary) 100%);
      color: white;
      text-align: center;
      padding: 60px 20px;
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-xl);
    }
    .hero-title {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .hero-subtitle {
      font-size: 1.1rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="material-icons-outlined">eco</span> WASTE2WORTH
      </div>
      <nav class="sidebar-nav">
        <!-- We use javascript to correct the dashboard link based on role, but default to citizen -->
        <a href="/dashboard/citizen" class="nav-item" id="navDashboardLink">
          <span class="material-icons-outlined">home</span> Dashboard
        </a>
        <a href="/storefront" class="nav-item active">
          <span class="material-icons-outlined">storefront</span> Storefront
        </a>
        <div class="nav-section-title">Account</div>
        <a href="/login" class="nav-item" id="navAuthLink">
          <span class="material-icons-outlined">login</span> Login
        </a>
      </nav>
      <div class="sidebar-footer">
        <div style="font-size: 12px; color: rgba(255,255,255,0.5); text-align: center;">&copy; 2026 WASTE2WORTH</div>
      </div>
    </aside>

    <div class="main-wrapper">
      <!-- HEADER -->
      <header class="header">
        <button id="sidebarToggle" class="sidebar-toggle" aria-label="Toggle Navigation">
          <span class="material-icons-outlined">menu</span>
        </button>
        <div class="header-search">
          <span class="material-icons-outlined">search</span>
          <input type="text" placeholder="Search crafts..." aria-label="Search">
        </div>
        <div class="header-user" id="headerUser" style="display: none;">
          <div class="green-points-badge">
            <span class="material-icons-outlined" style="font-size:16px;">stars</span>
            <span class="green-points-value">0</span>
          </div>
          <div class="user-info">
            <span class="user-name">User</span>
            <span class="user-role">Role</span>
          </div>
          <div class="user-avatar">U</div>
        </div>
      </header>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        
        <section class="hero-section animate-slide-up">
          <h1 class="hero-title">Upcycled Craft Marketplace</h1>
          <p class="hero-subtitle">Discover unique handcrafted products made from recycled materials.</p>
        </section>
        
        <div class="filter-chips animate-slide-up" style="animation-delay: 100ms; justify-content: center; margin-bottom: 30px;">
          <button class="chip active">All Crafts</button>
          <button class="chip">Home Decor</button>
          <button class="chip">Fashion</button>
          <button class="chip">Accessories</button>
          <button class="chip">Art</button>
        </div>
        
        <div id="storefrontGrid" class="product-grid animate-slide-up" style="animation-delay: 200ms;">
          <div style="grid-column: 1/-1;" class="loading-spinner"><div class="spinner"></div></div>
        </div>

      </main>
    </div>
  </div>
  
  <script src="/js/app.js" defer></script>
</body>
</html>

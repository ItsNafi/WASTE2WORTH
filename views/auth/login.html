<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — WASTE2WORTH</title>
  <meta name="description" content="Sign in to your WASTE2WORTH account to manage scrap listings and eco-crafts">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card animate-slide-up">
      <div class="auth-brand">
        <span class="material-icons-outlined" style="font-size:48px;color:var(--color-primary)">eco</span>
        <h1>WASTE2WORTH</h1>
        <p>Turn waste into value. Sign in to continue.</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary-gradient btn-block btn-lg">Sign In</button>
      </form>
      <div class="auth-footer">
        <p>Don't have an account? <a href="/register">Create one</a></p>
      </div>
    </div>
  </div>
  <script src="/js/app.js" defer></script>
</body>
</html>
